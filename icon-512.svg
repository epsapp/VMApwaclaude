  <text x="256" y="400" text-anchor="middle" font-family="Arial Black, Arial" font-weight="900" font-size="64" fill="#00e5ff" letter-spacing="4">VMA</text>
  <text x="256" y="450" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" fill="#5a6070" letter-spacing="6">TRACKER</text>
