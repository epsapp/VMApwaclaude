  <line x1="256" y1="220" x2="216" y2="270" stroke="#00e5ff" stroke-width="16" stroke-linecap="round"/>
  <line x1="256" y1="220" x2="296" y2="255" stroke="#00e5ff" stroke-width="16" stroke-linecap="round"/>
  <line x1="256" y1="260" x2="226" y2="310" stroke="#00e5ff" stroke-width="16" stroke-linecap="round"/>
